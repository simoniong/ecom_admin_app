service: ecom-admin-app

image: ghcr.io/simoniong/ecom_admin_app

servers:
  web:
    hosts:
      - 159.65.143.163
    options:
      network: kamal

proxy:
  ssl: false
  host: 159.65.143.163

registry:
  server: ghcr.io
  username: simoniong
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    RAILS_ENV: production
    RAILS_LOG_TO_STDOUT: "1"
    RAILS_SERVE_STATIC_FILES: "1"
    SOLID_QUEUE_IN_PUMA: "1"
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL

accessories:
  shared-db:
    image: postgres:16
    host: 159.65.143.163
    env:
      clear:
        POSTGRES_DB: ecom_admin_app_production
        POSTGRES_USER: ecom_admin_app
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
    options:
      network: kamal

builder:
  arch: amd64
