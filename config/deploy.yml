service: ecom-admin-app

image: simoniong/ecom_admin_app

registry:
  server: ghcr.io
  username: simoniong
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    RAILS_ENV: production
    RAILS_LOG_TO_STDOUT: "1"
    RAILS_SERVE_STATIC_FILES: "1"
    SOLID_QUEUE_IN_PUMA: "1"
  secret:
    - RAILS_MASTER_KEY
    - DB_PASSWORD
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - SHOPIFY_SHOP_DOMAIN
    - SHOPIFY_ACCESS_TOKEN
    - SEVENTEEN_TRACK_API_KEY
    - SEVENTEEN_TRACK_WEBHOOK_TOKEN
    - AGENT_API_KEY
    - META_APP_ID
    - META_APP_SECRET
    - SHOPIFY_CLIENT_ID
    - SHOPIFY_CLIENT_SECRET
    - SENTRY_DSN
    - GMAIL_SMTP_USER
    - GMAIL_SMTP_PASSWORD

builder:
  arch: amd64
