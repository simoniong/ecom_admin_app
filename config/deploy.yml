service: ecom-admin-app

image: simoniong/ecom_admin_app

registry:
  server: ghcr.io
  username: simoniong
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    RAILS_ENV: production
    RAILS_LOG_TO_STDOUT: "1"
    RAILS_SERVE_STATIC_FILES: "1"
    SOLID_QUEUE_IN_PUMA: "1"
  secret:
    - RAILS_MASTER_KEY
    - DB_PASSWORD

builder:
  arch: amd64
