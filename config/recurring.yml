production:
  sync_gmail_threads:
    class: SyncGmailThreadsJob
    schedule: every 10 minutes
  tracking_refresh:
    class: TrackingRefreshJob
    schedule: every 10 minutes
  sync_ad_metrics:
    class: SyncAdMetricsJob
    schedule: every 30 minutes
  refresh_meta_tokens:
    class: RefreshMetaTokensJob
    schedule: every day at 3am
  sync_shopify_metrics:
    class: SyncShopifyMetricsJob
    schedule: every 6 hours
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

development:
  sync_gmail_threads:
    class: SyncGmailThreadsJob
    schedule: every 10 minutes
  tracking_refresh:
    class: TrackingRefreshJob
    schedule: every 10 minutes
  sync_ad_metrics:
    class: SyncAdMetricsJob
    schedule: every 30 minutes
  refresh_meta_tokens:
    class: RefreshMetaTokensJob
    schedule: every day at 3am
  sync_shopify_metrics:
    class: SyncShopifyMetricsJob
    schedule: every 6 hours
